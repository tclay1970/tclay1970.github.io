<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>KMLB Live Weather</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#08111f;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.panel{
    width:100%;
    max-width:1000px;
    background:#111827;
    border-radius:24px;
    padding:32px;
    box-shadow:0 25px 60px rgba(0,0,0,.45);
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:30px;
}

.title{
    font-size:52px;
    font-weight:700;
    letter-spacing:2px;
}

.subtitle{
    color:#94a3b8;
    margin-top:8px;
    font-size:16px;
}

.updated{
    color:#64748b;
    font-size:14px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
}

.stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.card{
    background:#1e293b;
    border-radius:18px;
    padding:22px;
}

.label{
    color:#94a3b8;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:1px;
    margin-bottom:10px;
}

.value{
    font-size:34px;
    font-weight:700;
}

.diagram{
    position:relative;
    background:#0f172a;
    border-radius:22px;
    height:450px;
    overflow:hidden;
}

/* Runways */

.runway{
    position:absolute;
    width:340px;
    height:36px;
    background:#4b5563;
    border:2px solid #d1d5db;
    border-radius:10px;
    transform:rotate(90deg);
    transition:.35s ease;
}

.rwy1{
    top:125px;
    left:90px;
}

.rwy2{
    top:125px;
    left:210px;
}

.active{
    background:#16a34a;
    box-shadow:0 0 25px rgba(34,197,94,.85);
}

.rwy-label{
    position:absolute;
    font-size:15px;
    font-weight:700;
    color:white;
}

/* Wind arrow */

.wind-arrow{
    position:absolute;
    top:145px;
    left:175px;
    transform-origin:center center;
    transition:transform .6s ease;
}

.wind-arrow svg{
    width:150px;
    height:150px;
}

/* Raw METAR */

.metar-container{
    margin-top:30px;
    background:#0f172a;
    border-radius:18px;
    padding:20px;
}

.metar-title{
    color:#94a3b8;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:1px;
    margin-bottom:10px;
}

.metar{
    font-family:Consolas, monospace;
    font-size:16px;
    line-height:1.6;
    color:#e2e8f0;
    word-break:break-word;
}

.footer{
    margin-top:18px;
    color:#64748b;
    font-size:12px;
    text-align:center;
}

@media(max-width:900px){

    .grid{
        grid-template-columns:1fr;
    }

    .diagram{
        height:400px;
    }

}

</style>
</head>

<body>

<div class="panel">

    <div class="header">

        <div>
            <div class="title">KMLB</div>
            <div class="subtitle">
                Melbourne Orlando International Airport
            </div>
        </div>

        <div class="updated" id="updated">
            Updating...
        </div>

    </div>

    <div class="grid">

        <!-- WEATHER STATS -->

        <div class="stats">

            <div class="card">
                <div class="label">Wind</div>
                <div class="value" id="wind">
                    --
                </div>
            </div>

            <div class="card">
                <div class="label">Temperature</div>
                <div class="value" id="temp">
                    --
                </div>
            </div>

            <div class="card">
                <div class="label">Visibility</div>
                <div class="value" id="vis">
                    --
                </div>
            </div>

            <div class="card">
                <div class="label">Altimeter</div>
                <div class="value" id="alt">
                    --
                </div>
            </div>

        </div>

        <!-- RUNWAY DISPLAY -->

        <div class="diagram">

            <!-- Runways -->

            <div class="runway rwy1" id="rwy1"></div>
            <div class="runway rwy2" id="rwy2"></div>

            <!-- Labels -->

            <div class="rwy-label" style="top:40px; left:220px;">
                09R
            </div>

            <div class="rwy-label" style="bottom:40px; left:220px;">
                27L
            </div>

            <div class="rwy-label" style="top:40px; left:340px;">
                09L
            </div>

            <div class="rwy-label" style="bottom:40px; left:340px;">
                27R
            </div>

            <!-- Wind Arrow -->

            <div class="wind-arrow" id="windArrow">

                <svg viewBox="0 0 100 100">

                    <line
                        x1="50"
                        y1="88"
                        x2="50"
                        y2="20"
                        stroke="#38bdf8"
                        stroke-width="6"
                        stroke-linecap="round"
                    />

                    <polygon
                        points="50,5 38,28 62,28"
                        fill="#38bdf8"
                    />

                </svg>

            </div>

        </div>

    </div>

    <!-- RAW METAR -->

    <div class="metar-container">

        <div class="metar-title">
            Raw METAR
        </div>

        <div class="metar" id="rawMetar">
            Loading METAR...
        </div>

    </div>

    <div class="footer">
        Live NOAA / FAA Aviation Weather Data
    </div>

</div>

<script>

async function loadWeather(){

    try{

        const response = await fetch(
            "https://aviationweather.gov/api/data/metar?ids=KMLB&format=json"
        );

        const data = await response.json();

        const metar = data[0];

        console.log(metar);

        // Wind

        const windDir = parseInt(metar.wdir || 0);
        const windSpeed = parseInt(metar.wspd || 0);

        document.getElementById("wind").innerText =
            `${windDir}° @ ${windSpeed}kt`;

        // Temp

        document.getElementById("temp").innerText =
            `${metar.temp}°C`;

        // Visibility

        document.getElementById("vis").innerText =
            `${metar.visib}sm`;

        // Altimeter

        document.getElementById("alt").innerText =
            `${metar.altim}`;

        // Raw METAR

        document.getElementById("rawMetar").innerText =
            metar.rawOb;

        // Updated Time

        const now = new Date();

        document.getElementById("updated").innerText =
            `Updated ${now.toLocaleTimeString()}`;

        // Wind arrow rotation

        document.getElementById("windArrow").style.transform =
            `rotate(${windDir}deg)`;

        // Runway highlighting

        const rwy1 = document.getElementById("rwy1");
        const rwy2 = document.getElementById("rwy2");

        rwy1.classList.remove("active");
        rwy2.classList.remove("active");

        // East flow

        if(windDir >= 40 && windDir <= 140){

            rwy1.classList.add("active");
            rwy2.classList.add("active");

        }

        // West flow

        if(windDir >= 220 && windDir <= 320){

            rwy1.classList.add("active");
            rwy2.classList.add("active");

        }

    }
    catch(error){

        console.error(error);

        document.getElementById("rawMetar").innerText =
            "Unable to retrieve weather data.";

    }

}

// Initial load

loadWeather();

// Refresh every minute

setInterval(loadWeather, 60000);

</script>

</body>
</html>
