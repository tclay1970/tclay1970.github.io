<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Space Coast Aviation Weather</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    padding: 24px;
    background: #0B172A;
    color: white;
    font-family: 'Montserrat', sans-serif;
  }

  h1 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 2rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 24px;
    justify-items: center;
  }

  .card {
    width: 100%;
    max-width: 370px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 14px;
  }

  .airport-name {
    text-align: center;
    margin-bottom: 12px;
    font-weight: 600;
    color: #DCE7FF;
  }

  .widget {
    width: 100%;
    min-height: 278px;
  }
</style>
</head>

<body>

<h1>Space Coast Aviation Weather</h1>

<div class="grid">

  <!-- KMLB -->
  <div class="card">
    <div class="airport-name">KMLB — Melbourne Orlando Intl</div>

    <a
      id="kmlbWidget"
      class="widget"
      href="https://metar-taf.com/KMLB">
      METAR KMLB
    </a>

    <script async defer crossorigin="anonymous"
      src="https://metar-taf.com/embed-js/KMLB?layout=landscape&visibility=mi&qnh=inHg&rh=rh&bg_color=012D68&target=kmlbWidget">
    </script>
  </div>

  <!-- KTIX -->
  <div class="card">
    <div class="airport-name">KTIX — Space Coast Regional</div>

    <a
      id="ktixWidget"
      class="widget"
      href="https://metar-taf.com/KTIX">
      METAR KTIX
    </a>

    <script async defer crossorigin="anonymous"
      src="https://metar-taf.com/embed-js/KTIX?layout=landscape&visibility=mi&qnh=inHg&rh=rh&bg_color=012D68&target=ktixWidget">
    </script>
  </div>

  <!-- X59 -->
  <div class="card">
    <div class="airport-name">X59 — Valkaria Airport</div>

    <a
      id="x59Widget"
      class="widget"
      href="https://metar-taf.com/X59">
      METAR X59
    </a>

    <script async defer crossorigin="anonymous"
      src="https://metar-taf.com/embed-js/X59?layout=landscape&visibility=mi&qnh=inHg&rh=rh&bg_color=012D68&target=x59Widget">
    </script>
  </div>

  <!-- X26 -->
  <div class="card">
    <div class="airport-name">X26 — Sebastian Municipal</div>

    <a
      id="x26Widget"
      class="widget"
      href="https://metar-taf.com/X26">
      METAR X26
    </a>

    <script async defer crossorigin="anonymous"
      src="https://metar-taf.com/embed-js/X26?layout=landscape&visibility=mi&qnh=inHg&rh=rh&bg_color=012D68&target=x26Widget">
    </script>
  </div>

</div>

</body>
</html>
