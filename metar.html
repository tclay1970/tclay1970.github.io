<script>

const stations = ["KCOF","KMLB","KDAB","KORL"];

async function loadWeather() {

    const grid = document.getElementById("grid");

    grid.innerHTML = "";

    for (const station of stations) {

        try {

            const response = await fetch(
                `https://avwx.rest/api/metar/${station}?format=json`,
                {
                    headers: {
                        Authorization: "YOUR_API_KEY"
                    }
                }
            );

            const metar = await response.json();

            const category = (
                metar.flight_rules || "VFR"
            ).toLowerCase();

            const windDir = metar.wind_direction?.value || "VRB";
            const windSpeed = metar.wind_speed?.value || "0";
            const visibility = metar.visibility?.value || "--";
            const temp = metar.temperature?.value || "--";
            const altimeter = metar.altimeter?.value || "--";

            const card = document.createElement("div");

            card.className = "card";

            card.innerHTML = `
                <div class="station">
                    ${station}
                </div>

                <div class="category ${category}">
                    ${metar.flight_rules || "VFR"}
                </div>

                <div class="data">

                    <div>
                        <div class="label">Wind</div>
                        <div class="value">
                            ${windDir}° @ ${windSpeed}kt
                        </div>
                    </div>

                    <div>
                        <div class="label">Visibility</div>
                        <div class="value">
                            ${visibility}sm
                        </div>
                    </div>

                    <div>
                        <div class="label">Temperature</div>
                        <div class="value">
                            ${temp}°C
                        </div>
                    </div>

                    <div>
                        <div class="label">Altimeter</div>
                        <div class="value">
                            ${altimeter}
                        </div>
                    </div>

                </div>

                <div class="raw">
                    ${metar.raw || ""}
                </div>
            `;

            grid.appendChild(card);

        } catch (err) {

            console.error(err);

            const errorCard = document.createElement("div");

            errorCard.className = "card";

            errorCard.innerHTML = `
                <div class="station">${station}</div>

                <div class="raw">
                    Failed to load weather data.
                </div>
            `;

            grid.appendChild(errorCard);

        }

    }

}

loadWeather();

setInterval(loadWeather, 60000);

</script>
