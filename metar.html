<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>METAR Dashboard</title>

<style>
    body {
        margin: 0;
        padding: 20px;
        background: #08111f;
        font-family: Arial, sans-serif;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(2, 350px);
        gap: 20px;
        justify-content: center;
    }

    .widget {
        width: 350px;
        height: 278px;
    }
</style>
</head>

<body>

<div class="grid">

    <div class="widget">
        <a id="wx1"></a>
    </div>

    <div class="widget">
        <a id="wx2"></a>
    </div>

    <div class="widget">
        <a id="wx3"></a>
    </div>

    <div class="widget">
        <a id="wx4"></a>
    </div>

</div>

<script async defer crossorigin="anonymous"
src="https://metar-taf.com/embed-js/KCOI?station_id=KCOF&layout=landscape&bg_color=012D68&visibility=mi&qnh=inHg&rh=rh&target=wx1">
</script>

<script async defer crossorigin="anonymous"
src="https://metar-taf.com/embed-js/KMLB?station_id=KMLB&layout=landscape&bg_color=012D68&visibility=mi&qnh=inHg&rh=rh&target=wx2">
</script>

<script async defer crossorigin="anonymous"
src="https://metar-taf.com/embed-js/KDAB?station_id=KDAB&layout=landscape&bg_color=012D68&visibility=mi&qnh=inHg&rh=rh&target=wx3">
</script>

<script async defer crossorigin="anonymous"
src="https://metar-taf.com/embed-js/KORL?station_id=KORL&layout=landscape&bg_color=012D68&visibility=mi&qnh=inHg&rh=rh&target=wx4">
</script>

</body>
</html>
