<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Instructor Card</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #e5e7eb;
  }

  .container {
    max-width: 420px;
    margin: auto;
    background: white;
    min-height: 100vh;
    position: relative;
  }

  /* HEADER */
  .header {
    position: relative;
    background: linear-gradient(135deg, #012D68 0%, #012D68 100%);
    color: white;
    padding: 30px 150px 140px 20px;
    clip-path: polygon(0 0, 100% 0, 100% 75%, 0 90%);
    overflow: hidden;
  }

  /* NEW RIGHT-SIDE IMAGE */
  .header-image {
    position: absolute;
    top: 0;
    right: 0;
    width: 160px;
    height: 100%;
    z-index: 1;
    overflow: hidden;
  }

  .header-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.25; /* adjust for visibility */
  }

  .logo,
  .name,
  .certs,
  .role {
    position: relative;
    z-index: 2; /* keeps text above image */
  }

  .logo {
    width: 230px;
    margin-bottom: 30px;
  }

  .name {
    font-size: 34px;
    font-weight: 700;
    margin-bottom: 10px;
  }

  .certs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .badge {
    background: rgba(255, 255, 255, 0.18);
    padding: 3px 7px;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 600;
  }

  .role {
    font-size: 20px;
  }

  /* PROFILE */
  .profile {
    position: absolute;
    top: 245px;
    right: 20px;
    z-index: 3; /* ABOVE header image */
  }

  .profile img {
    width: 155px;
    height: 155px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
  }

  /* CONTENT */
  .content {
    padding: 10px 24px 24px;
    margin-top: -10px;
    color: #374151;
  }

  .description {
    font-size: 19px;
    line-height: 1.7;
    margin-bottom: 30px;
  }

  /* CONTACT */
  .contact {
    background: #f1f5f9;
    padding: 20px;
  }

  .contact-item {
    display: flex;
    align-items: center;
    margin-bottom: 18px;
  }

  .icon {
    width: 50px;
    height: 50px;
    background: #012D68;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 15px;
  }

  .icon svg {
    width: 22px;
    height: 22px;
    stroke: white;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .contact-text {
    font-size: 16px;
    line-height: 1.3;
  }

  .label {
    font-size: 12px;
    color: #6b7280;
  }

  .ext {
    color: #9ca3af;
    font-size: 14px;
  }

  a {
    text-decoration: none;
    color: inherit;
  }
</style>
</head>

<body>

<div class="container">

  <div class="header">

    <!-- NEW IMAGE AREA -->
    <div class="header-image">
      <img src="../images/logos/photostrip.png" alt="Aircraft">
    </div>

    <img class="logo" src="../images/logos/RA-FA WHITE.png" alt="Flight School Logo">

    <div class="name">[INSTRUCTOR NAME]</div>

    <div class="certs">
      <div class="badge">CFI</div>
      <div class="badge">CFII</div>
      <div class="badge">MEI</div>
      <div class="badge">Gold Seal</div>
    </div>

    <div class="role">Flight Instructor</div>
  </div>

  <div class="profile">
    <img src="../images/instructors/profile-placeholder.jpg" alt="Instructor Profile">
  </div>

  <div class="content">
    <div class="description">
      Providing industry leading flight instruction to aspiring career and recreational aviators.
    </div>
  </div>

  <div class="contact">
    <!-- (rest unchanged, keeping your original contact section) -->
  </div>

</div>

</body>
</html>
