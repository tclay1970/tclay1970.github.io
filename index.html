<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nic Clayton - Digital Card</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #e5e7eb;
  }

  .container {
    max-width: 420px;
    margin: auto;
    background: white;
    min-height: 100vh;
    position: relative;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #2c4aa5 0%, #3f66d6 100%);
    color: white;
    padding: 30px 20px 140px;
    clip-path: polygon(0 0, 100% 0, 100% 75%, 0 90%);
  }

  /* LOGO IMAGE */
  .logo {
    width: 190px;
    height: auto;
    margin-bottom: 30px;
    display: block;
  }

  .name {
    font-size: 34px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 20px;
    margin-bottom: 16px;
  }

  .role {
    font-size: 20px;
    font-style: italic;
  }

  /* PROFILE IMAGE */
  .profile {
    position: absolute;
    top: 210px;
    right: 24px;
    z-index: 2;
  }

  .profile img {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 6px solid white;
    object-fit: cover;
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
  }

  /* CONTENT */
  .content {
    padding: 30px 24px 24px;
    color: #374151;
  }

  .description {
    font-size: 19px;
    line-height: 1.7;
    margin-bottom: 30px;
  }

  /* CONTACT */
  .contact {
    background: #f1f5f9;
    padding: 20px;
    border-top: 1px solid #e5e7eb;
  }

  .contact-item {
    display: flex;
    align-items: center;
    margin-bottom: 18px;
  }

  .icon {
    width: 50px;
    height: 50px;
    background: #3f66d6;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 15px;
    color: white;
    font-size: 20px;
  }

  .contact-text {
    font-size: 16px;
  }

  .label {
    font-size: 12px;
    color: #6b7280;
  }

  a {
    text-decoration: none;
    color: inherit;
  }
</style>
</head>

<body>

<div class="container">

  <div class="header">

    <!-- LOGO IMAGE -->
    <img class="logo" src="images/logos/RA-FA WHITE.png" alt="Rocket Air Flight Academy">

    <div class="name">Nic Clayton</div>
    <div class="subtitle">Gold Seal CFI</div>
    <div class="role">Assistant Chief Flight Instructor</div>
  </div>

  <!-- PROFILE IMAGE -->
  <div class="profile">
    <img src="images/instructors/nclayton.jpg" alt="Nic Clayton">
  </div>

  <div class="content">
    <div class="description">
      Providing industry leading flight instruction to aspiring career and recreational aviators.
    </div>
  </div>

  <div class="contact">
    <a href="mailto:info@mlbflight.com">
      <div class="contact-item">
        <div class="icon">✉️</div>
        <div>
          <div class="contact-text">info@mlbflight.com</div>
          <div class="label">work</div>
        </div>
      </div>
    </a>

    <a href="tel:+11234567890">
      <div class="contact-item">
        <div class="icon">📞</div>
        <div>
          <div class="contact-text">(123) 456-7890</div>
          <div class="label">mobile</div>
        </div>
      </div>
    </a>

    <a href="https://linkedin.com" target="_blank">
      <div class="contact-item">
        <div class="icon">in</div>
        <div>
          <div class="contact-text">LinkedIn Profile</div>
          <div class="label">social</div>
        </div>
      </div>
    </a>
  </div>

</div>

</body>
</html>
