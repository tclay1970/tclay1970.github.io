<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nic Clayton - Digital Card</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #e5e7eb;
  }

  .container {
    max-width: 420px;
    margin: auto;
    background: white;
    min-height: 100vh;
  }

  /* TOP BLUE SECTION */
  .header {
    background: linear-gradient(135deg, #2f4ea2, #3b5fc4);
    color: white;
    padding: 30px 20px 100px;
    position: relative;
    clip-path: polygon(0 0, 100% 0, 100% 75%, 0 90%);
  }

  .logo {
    font-size: 14px;
    letter-spacing: 2px;
    opacity: 0.8;
    margin-bottom: 30px;
  }

  .name {
    font-size: 32px;
    font-weight: bold;
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 18px;
    opacity: 0.9;
    margin-bottom: 20px;
  }

  .role {
    font-size: 20px;
    font-style: italic;
    opacity: 0.9;
  }

  /* PROFILE IMAGE */
  .profile {
    position: absolute;
    bottom: -60px;
    right: 20px;
  }

  .profile img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 5px solid white;
    object-fit: cover;
  }

  /* DESCRIPTION */
  .content {
    padding: 80px 20px 20px;
    color: #374151;
  }

  .description {
    font-size: 18px;
    line-height: 1.6;
    margin-bottom: 30px;
  }

  /* CONTACT SECTION */
  .contact {
    background: #f3f4f6;
    padding: 20px;
  }

  .contact-item {
    display: flex;
    align-items: center;
    margin-bottom: 15px;
  }

  .icon {
    width: 50px;
    height: 50px;
    background: #3b5fc4;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 15px;
    color: white;
    font-size: 20px;
  }

  .contact-text {
    font-size: 16px;
  }

  .label {
    font-size: 12px;
    color: gray;
  }

  a {
    text-decoration: none;
    color: inherit;
  }
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="logo">ROCKET AIR FLIGHT ACADEMY</div>

    <div class="name">Nic Clayton</div>
    <div class="subtitle">Gold Seal CFI</div>
    <div class="role">Assistant Chief Flight Instructor</div>

    <div class="profile">
      <img src="nclayton.jpg" alt="Nic Clayton">
    </div>
  </div>

  <div class="content">
    <div class="description">
      Providing industry leading flight instruction to aspiring career and recreational aviators.
    </div>
  </div>

  <div class="contact">
    <a href="mailto:info@mlbflight.com">
      <div class="contact-item">
        <div class="icon">✉️</div>
        <div>
          <div class="contact-text">info@mlbflight.com</div>
          <div class="label">work</div>
        </div>
      </div>
    </a>

    <a href="tel:+1234567890">
      <div class="contact-item">
        <div class="icon">📞</div>
        <div>
          <div class="contact-text">(123) 456-7890</div>
          <div class="label">mobile</div>
        </div>
      </div>
    </a>

    <a href="https://linkedin.com" target="_blank">
      <div class="contact-item">
        <div class="icon">in</div>
        <div>
          <div class="contact-text">LinkedIn Profile</div>
          <div class="label">social</div>
        </div>
      </div>
    </a>
  </div>

</div>

</body>
</html>
