<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Name - Digital Card</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #111827;
      padding: 24px;
      border-radius: 16px;
      width: 90%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 16px;
      border: 3px solid #3b82f6;
    }

    h1 {
      margin: 10px 0 4px;
      font-size: 1.6rem;
    }

    .title {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    .links a {
      display: block;
      text-decoration: none;
      color: white;
      background: #2563eb;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      transition: 0.2s;
    }

    .links a:hover {
      background: #1d4ed8;
    }

    .footer {
      margin-top: 16px;
      font-size: 0.8rem;
      color: #64748b;
    }
  </style>
</head>

<body>
  <div class="card">
    <img src="your-photo.jpg" alt="Profile Photo" class="avatar">

    <h1>Your Name</h1>
    <div class="title">Your Job Title</div>

    <div class="links">
      <a href="tel:+1234567890">📞 Call Me</a>
      <a href="mailto:you@example.com">✉️ Email Me</a>
      <a href="https://linkedin.com/in/yourprofile" target="_blank">LinkedIn</a>
      <a href="https://yourwebsite.com" target="_blank">Website</a>
    </div>

    <div class="footer">
      Tap to connect
    </div>
  </div>
</body>
</html>
