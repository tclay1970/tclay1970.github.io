<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dynamic vCard</title>
</head>
<body>
    <h1>Tap to Add Contact</h1>
    <p>
        <a download="contact.vcf" href="data:text/vcard;charset=utf-8,
BEGIN:VCARD%0A
VERSION:3.0%0A
FN:John Doe%0A
TEL:+1234567890%0A
EMAIL:john.doe@example.com%0A
END:VCARD">
            Download My Contact
        </a>
    </p>
</body>
</html>
